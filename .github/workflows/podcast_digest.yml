name: Doppelgänger Podcast Digest

on:
  # Check daily at 10:00 UTC. New episodes usually drop Wed/Sat, but running
  # daily catches them promptly even if a release day shifts. De-duplication via
  # the persisted state means a day without a new episode simply sends nothing.
  schedule:
    - cron: "0 10 * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

# Read-only: state is persisted via the Actions cache, not committed back to the
# repo. (A push to a protected main would fail and isn't needed.)
permissions:
  contents: read

# Avoid overlapping runs (e.g. a manual run during a scheduled one) racing on state.
concurrency:
  group: podcast-digest
  cancel-in-progress: false

jobs:
  summarize:
    name: Fetch & Summarize New Episodes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the processed-episode marker (last_processed.json) from the
      # previous run. This is the single source of truth for de-duplication —
      # without it every run treats the latest episodes as new and re-sends them
      # (the cause of the duplicate mails). The key is unique per run, so the
      # exact key never hits and resolution always falls through to the
      # `podcast-state-` restore-keys prefix, returning the MOST RECENT saved
      # state. This avoids the frozen-exact-key trap of a shared restore/save key.
      - name: Restore episode state
        uses: actions/cache/restore@v4
        with:
          path: last_processed.json
          key: podcast-state-${{ github.run_id }}
          restore-keys: |
            podcast-state-

      - name: Run summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          # Optional: only needed if doppelgaenger.ai is unavailable
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python summarizer.py

      # Persist the (possibly updated) marker under this run's unique key so the
      # next run restores it via the prefix above. Guarded on the file existing
      # so a run that errors before writing state doesn't fail here. Always runs
      # so state written mid-batch survives.
      - name: Save episode state
        if: always() && hashFiles('last_processed.json') != ''
        uses: actions/cache/save@v4
        with:
          path: last_processed.json
          key: podcast-state-${{ github.run_id }}
